<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astropulse – Order Dashboard</title>
    <link rel="icon" href="/favicon.png" sizes="32x32">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", system-ui, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: floatBg 20s ease-in-out infinite;
            z-index: -2;
        }

        @keyframes floatBg {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.1) rotate(180deg); opacity: 0.8; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #ccc;
            font-size: 1.2rem;
            font-weight: 400;
        }

        /* Input Form Section */
        .input-section {
            max-width: 500px;
            margin: 0 auto 2rem;
            opacity: 1;
            transform: translateY(0);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .input-section.hidden {
            opacity: 0;
            transform: translateY(-50px);
            pointer-events: none;
            height: 0;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .form-box {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .form-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #667eea);
            background-size: 300% 100%;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        label {
            display: block;
            margin-bottom: 1.2rem;
            font-weight: 700;
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 20px 24px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 500;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #fff;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        input[type="text"]::placeholder {
            color: #888;
            font-weight: 400;
        }

        button {
            width: 100%;
            padding: 20px 32px;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            color: #000;
            font-weight: 800;
            font-size: 1.2rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 15px 35px rgba(255,255,255,0.25);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(255,255,255,0.35);
        }

        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding: 14px 28px;
            border-radius: 20px;
            text-decoration: none;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.2);
            font-weight: 600;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.15);
        }

        /* Results Section */
        .results-section {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .results-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        .result {
            background: rgba(255,255,255,0.025);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            max-width: 700px;
            margin: 0 auto;
        }

        .result::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(76,175,80,0.1) 0%, transparent 70%);
            animation: successPulse 2s ease-out infinite;
            z-index: 0;
        }

        @keyframes successPulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .result-content {
            position: relative;
            z-index: 2;
        }

        .result h3 {
            margin-bottom: 2rem;
            color: #fff;
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .result-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 20px 24px;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .result-row:hover {
            transform: translateX(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .label {
            flex: 1;
            color: #bbb;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .value {
            flex: 2;
            font-weight: 700;
            color: #fff;
            font-size: 1.15rem;
        }

        .status-processed {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 16px 24px;
            border-radius: 25px;
            font-weight: 700;
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            box-shadow: 0 10px 30px rgba(76,175,80,0.3);
            animation: bounceIn 0.6s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .error {
            color: #ff4444;
            font-size: 1.1rem;
            text-align: center;
            padding: 30px;
            background: rgba(255,68,68,0.15);
            border: 2px solid rgba(255,68,68,0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .telegram-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,136,204,0.4);
            font-size: 1.8rem;
            text-decoration: none;
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: telegramFloat 3s ease-in-out infinite;
        }

        @keyframes telegramFloat {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        .telegram-float:hover {
            animation-play-state: paused;
            transform: translateY(-20px) scale(1.15);
        }

        footer {
            text-align: center;
            color: #666;
            font-size: 0.95rem;
            margin-top: auto;
            padding: 3rem 0 2rem;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            h1 { font-size: 2.2rem; }
            .form-box, .result { padding: 30px 24px; }
            .result-row { flex-direction: column; gap: 12px; text-align: center; }
            .result h3 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Astropulse Order Dashboard</h1>
            <p class="subtitle">Enter your Order ID to check order details and status</p>
        </div>

        <!-- Input Form (Disappears after success) -->
        <div class="input-section" id="inputSection">
            <div class="form-box">
                <label for="orderId">Enter Order ID</label>
                <input type="text" id="orderId" placeholder="e.g. INSTA_F123 or FACE_L456" />
                <button onclick="checkOrder()">Check Order Status</button>
                <a href="index.html" class="back-btn">← Back to Orders</a>
            </div>
        </div>

        <!-- Results Section (Appears after success) -->
        <div class="results-section" id="resultsSection">
            <div class="result" id="resultBox" style="display: none;">
                <div class="result-content">
                    <h3>Order Details</h3>
                    <div id="resultContent"></div>
                </div>
            </div>
        </div>

        <footer>
            Made with ❤️ for social media growth | 
            <a href="https://t.me/aastropulsesupport_bot" target="_blank">Live Support</a>
        </footer>
    </div>

    <a href="https://t.me/aastropulsesupport_bot" class="telegram-float" target="_blank" rel="noopener" title="Live Support">
        <i class="fab fa-telegram-plane"></i>
    </a>

    <script>
        // Order ID decoder (exactly your format)
        const orderDecoder = {
            'INSTA_F': 'Instagram Followers',
            'INSTA_L': 'Instagram Likes', 
            'INSTA_C': 'Instagram Comments',
            'INSTA_V': 'Instagram Views',
            'INSTA_S': 'Instagram Shares',
            'FACE_F': 'Facebook Followers',
            'FACE_L': 'Facebook Likes',
            'FACE_V': 'Facebook Views',
            'TWITT_F': 'Twitter Followers',
            'TWITT_L': 'Twitter Likes',
            'TWITT_R': 'Twitter Retweets',
            'TWITT_V': 'Twitter Views',
            'TELE_M': 'Telegram Members',
            'TELE_V': 'Telegram Views'
        };

        function parseOrderId(orderId) {
            const prefix = orderId.substring(0, 7);
            return orderDecoder[prefix] || 'Unknown Service';
        }

        function checkOrder() {
            const idInput = document.getElementById("orderId");
            const inputSection = document.getElementById("inputSection");
            const resultsSection = document.getElementById("resultsSection");
            const resultBox = document.getElementById("resultBox");
            const resultContent = document.getElementById("resultContent");
            
            const orderId = idInput.value.trim().toUpperCase();

            if (!orderId) {
                showError("Please enter an Order ID.");
                return;
            }

            const orderIdRegex = /^(INSTA|FACE|TWITT|TELE)_[FLCRVSM][0-9]{3}$/;
            if (!orderIdRegex.test(orderId)) {
                showError("Invalid Order ID format. Example: INSTA_F123, FACE_L456");
                return;
            }

            // Hide input form with beautiful animation
            inputSection.classList.add('hidden');
            
            // Show results with delay for dramatic effect
            setTimeout(() => {
                resultsSection.classList.add('show');
                resultBox.style.display = "block";
                
                const serviceName = parseOrderId(orderId);
                const currentTime = new Date().toLocaleString('en-IN', {
                    timeZone: 'Asia/Kolkata',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                resultContent.innerHTML = `
                    <div class="result-row">
                        <div class="label">Order ID</div>
                        <div class="value">${orderId}</div>
                    </div>
                    <div class="result-row">
                        <div class="label">Order Name</div>
                        <div class="value">${serviceName}</div>
                    </div>
                    <div class="result-row">
                        <div class="label">Current Time</div>
                        <div class="value">${currentTime} IST</div>
                    </div>
                    <div class="result-row">
                        <div class="label">Status</div>
                        <div class="value">✅ Order Processed</div>
                    </div>
                    <div class="status-processed">Thanks for using Our Service!</div>
                `;
            }, 600);
        }

        function showError(message) {
            const resultBox = document.getElementById("resultBox");
            const resultContent = document.getElementById("resultContent");
            const resultsSection = document.getElementById("resultsSection");
            
            resultsSection.classList.add('show');
            resultBox.style.display = "block";
            resultContent.innerHTML = `<p class="error">${message}</p>`;
        }

        // Enter key support
        document.getElementById('orderId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkOrder();
            }
        });

        // Reset on new order ID input
        document.getElementById('orderId').addEventListener('input', function() {
            const inputSection = document.getElementById("inputSection");
            const resultsSection = document.getElementById("resultsSection");
            const resultBox = document.getElementById("resultBox");
            
            inputSection.classList.remove('hidden');
            resultsSection.classList.remove('show');
            resultBox.style.display = "none";
        });
    </script>
</body>
</html>
